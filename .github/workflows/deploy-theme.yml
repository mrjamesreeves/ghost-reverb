name: Deploy Theme
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Ghost Theme
        uses: TryGhost/action-deploy-theme@v1
        with:
          api-url: ${{ secrets.GHOST_ADMIN_API_URL }}
          api-key: ${{ secrets.GHOST_ADMIN_API_KEY }}
          # The action's built-in exclude already covers .git*, .zip,
          # yarn*, npm*, node_modules*, routes.yaml, redirects.yaml. We
          # add .claude/ (worktree scratch, settings.local.json) and
          # CLAUDE.md so theme-author notes don't end up on the server.
          exclude: ".claude* CLAUDE.md"
