routes:
  /tag/midnight-radio/:
    template: page-radio
    redirect: /radio
  /dreams/:
    template: page-dreams
  /favorites/:
    template: page-favorites
  /art-diary/:
    template: page-art-diary


collections:
  # Public Works: posts tagged 'public-works' get nested URLs.
  # The collection index renders page-public-works.hbs at /public-works/.
  # Individual posts use partials/public-works/_deck.hbs via post.hbs dispatch.
  /public-works/:
    permalink: /public-works/{slug}/
    template: page-public-works
    filter: tag:public-works
    order: published_at desc

  # Root collection (everything not in /public-works/).
  /:
    permalink: /{slug}/
    template: home
    filter: tag:-public-works

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
