# Zen routes.
#
# No landing pages: each section URL renders a "channel" template that
# shows the LATEST post of that tag as a full post, with the dial nav
# for moving through the rest. Channel templates live at the theme root
# (channel-*.hbs) and use literal tag filters — Ghost's {{#get}} helper
# doesn't reliably interpolate handlebars inside its filter param, so
# one small template per section beats one clever broken one.
#
# NOTE: routes.yaml is NOT deployed by the GitHub Action. After changing
# this file, upload it manually: Ghost admin → Settings → Labs → Routes.

routes:
  # data: binds each route to its tag — the page inherits the tag's
  # metadata (title/description/OG from Ghost admin → tag settings),
  # and Ghost 301s the old /tag/{slug}/ URL here, killing the
  # duplicate taxonomy pages.
  /radio/:
    template: channel-midnight-radio
    data: tag.midnight-radio
  /dreams/:
    template: channel-dreams
    data: tag.dreams
  /art-diary/:
    template: channel-art-diary
    data: tag.art-diary
  /favorites/:
    template: channel-favorites
    data: tag.favorites
  /public-works/:
    template: channel-public-works
    data: tag.public-works

collections:
  # Everything lives at root: /{slug}/. Public Works posts lose their
  # nested /public-works/{slug}/ URLs — redirects.json maps the old
  # nested URLs back to the bare slugs.
  /:
    permalink: /{slug}/
    template: index

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/
