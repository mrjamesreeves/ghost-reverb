routes:
  /tag/midnight-radio/:
    template: page-radio
    redirect: /radio
  /dreams/:
    template: page-dreams
  /favorites/:
    template: page-favorites
  /art-diary/:
    template: page-art-diary
  

collections:
  # Installations: posts tagged 'installations' get nested URLs.
  # The collection index renders page-installations.hbs at /installations/.
  # Individual posts use post-installations.hbs (auto-applied by primary tag).
  /installations/:
    permalink: /installations/{slug}/
    template: page-installations
    filter: tag:installations
    order: published_at desc

  # Root collection (everything not in /installations/).
  /:
    permalink: /{slug}/
    template: home
    filter: tag:-installations

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/