routes:
  /tag/midnight-radio/:
    template: page-radio
    redirect: /radio
  /dreams/:
    template: page-dreams
  /favorites/:
    template: page-favorites
  /art-diary/:
    template: page-art-diary
  

  # Other collections
  /broadcasts/:
    permalink: /broadcasts/{slug}/
    filter: tag:broadcasts
    template: tag-broadcasts
    data: tag.broadcasts
    
  /design/:
    permalink: /design/{slug}/
    filter: tag:design
    template: tag-design
    data: tag.design
    
  /art/:
    permalink: /art/{slug}/
    filter: tag:artwork
    template: tag-artwork
    data: tag.artwork
    
  /books/:
    permalink: /books/{slug}/
    filter: tag:books
    template: tag-books
    data: tag.books

  # Root collection (homepage)
  /:
    permalink: /{slug}/
    template: home

taxonomies:
  tag: /tag/{slug}/
  author: /author/{slug}/